body:
  text: 營平二州地名記地理類七古蹟之屬提要臣等謹案營平二州地名記一巻國朝顧炎武撰炎武有春秋杜解補正已著錄按爾雅營州孫炎注以為殷制孔頴達尚書疏謂舜十二州有營州殷本虞制分青州地為之凡在遼水東者東至朝鮮之境皆古營州地也平州即今永平府在虞時亦為營州地秦時為右北平遼西地後漢洎晉皆為遼西地後漢末公孫度自號平州牧于是平州之名始見於史炎武遊永平時郡人以志屬之炎武未應其求因摭古來營平二州故實纂為六巻付之題曰營平二州史事今其書不存此本出自恵棟紅豆齋惟載二州古地名至五代而止又僅一巻意其為六巻之一也其中卑耳之谿一條既引管子最後一葉又載俞兒一事全文當是隨筆雜鈔失於刪削不但非其完書並為未定之稿本矣然炎武嫻於地理所纂述多可依据書雖殘缺要於考證之學不為無補焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:3a08d008fee7e49f9240b20973b10352c0503fd0829f1b8251d82241cb433c59
