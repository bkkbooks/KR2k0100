body:
  text: 營平二州地名記崑山顧炎武撰唐碣石書夾右碣石入于河傳曰碣石海畔山疏曰碣石在右北平驪城縣西南太史記索隱曰地理志云碣石山在北平驪城縣西南康地理志云樂浪遂城縣有碣石山長城所起又水經云在遼西臨榆縣南水中蓋碣石山有二此云夾右碣石入于河當非北平之碣石商孤竹國爾雅孤竹北戶史記伯夷叔齊孤竹君之二子也正義引括地志云孤竹古城在盧龍縣南十二里殷時諸侯孤竹國漢書令支有孤竹城應劭曰故伯夷國魏書肥如有孤竹山祠水經注玄水又西南徑孤竹城北西入濡水案水經注言祠在山上城在山側肥如縣南十二里水之會也今孤竹城巳無遺迹而祠在府城之西北二十里灤河之左洞山之隂夾河有孤竹君三冡豈魏之肥如治尚在其東北耶而又案孤竹始封于此北即令支南即黃雒儉于百里遼史云興中府本古孤竹國漢柳城之地則又在今祠東北五百餘里幅貟之廣幾方千里矣豈殷末諸侯兼併而致之歟隋裴矩又言高麗本孤竹國周以封箕子則恐逢君之指而為是説耳首陽山論語伯夷叔齊餓于首陽之下説文首陽山在遼西論語注馬融曰首陽山在河東蒲坂華山之河北曲之中史記正義引曹大家注幽通賦云在隴西戴延之西征記云雒陽東北首陽山有夷齊祠今在偃師縣西北並引説文此語歷代祀典並在河東蒲坂為證蓋從馬融之説黃雒城遼史灤州古黃雒城周山戎春秋莊公三十年冬齊人伐山戎注曰山戎北狄史記齊世家山戎伐燕燕告急於齊齊桓公救燕遂伐山戎至于孤竹而還胸奴傳山戎越燕而伐齊齊釐公與戰於齊郊其後四十四年而山戎伐燕燕告急于齊齊桓公北伐山戎山戎走胡三省通鑑注曰自漢北平無終白狼以北皆大山重谷諸戎居之春秋謂之山戎北郭造卿曰山戎北戎是二種自燕東北以外為遼西以外為代遼後分為東西無非北戎地代後截為上谷無非山戎地而北戎為尤大故必平山戎而同許男以伐之令支國語桓公北伐山戎刜令支斬孤竹而來歸海濵諸夷莫不率服史記齊世家北伐山戎離枝孤竹集解曰地理志曰令支縣有孤竹城疑離枝即令支也令離聲相近應劭曰令音鈴鈴離聲亦相近管子亦作離字縣索隱曰離枝孤竹皆古國名秦以離支為又案周書王會曰不令支者令支也卑耳山國語懸車束馬踰太行與辟耳之溪枸夏韋昭曰太行辟耳山名枸夏辟耳之溪也三者皆山險溪谷鉤懸其車逼束其馬以度也史記齊世家登太行至卑耳山而還正義曰卑音壁管子桓公二十年征孤竹未至卑耳之溪十里案卑耳與太行連屬為文據二書皆云西伐而管子則云征孤竹或以此地為太行東北之極境亦可通燕碣石史記蘇秦傳説燕文侯曰南有碣石鴈門之饒長城史記胸奴傳七國時燕北有東胡山戎各分散居溪谷自有君長燕築長城自造陽至襄平置上谷漁陽右北平遼西遼東郡以拒胡秦碣石史記始皇紀三十二年始皇之碣石使燕人盧生求羡門高誓刻碣石門壞城郭決通隄防其辭曰遂興師旅誅戮無道為逆滅息武殄暴逆文復無罪庶心咸服惠論功勞賞及牛馬恩肥土域皇帝奮威德并諸侯初一泰平墮壞城郭決通川防夷去險阻地勢既定黎庶無繇天下咸撫男樂其疇女修其業事各有序惠被諸産久並來田莫不安所羣臣誦烈請刻此石垂著儀矩二世元年東行郡縣到碣石並海南至會稽而盡列始皇所立石刻石旁著大臣從者名長城史記胸奴傳始皇帝使蒙恬將十萬之衆北擊胡悉收河南地因河為塞築四十四縣城臨河徙適戍以充之而通直道自九原至雲陽因邊山險塹溪谷可繕者治之起臨洮至遼東萬餘里正義曰括地志云秦隴西郡臨洮縣即今岷州城本秦長城首起岷州西十二里延袤萬餘里東入遼水案秦長城當在今大寧界內漢右北平郡漢書秦置莽曰北順水經注魏氏土地記曰薊城東北三百里有右北平城後漢書章懷太子注營州西南有右北平郡故城括地志漁陽郡東南七十里有右北平城案史記胸奴傳燕置右北平郡不始于秦史但自秦分天下為三十六郡言之耳平剛右北平治魏志田疇傳舊北平郡治在平剛道出盧龍達于柳城通鑑注前漢右北平郡治平剛縣後漢省平剛縣改治土垠縣石城見水經注廷陵漢書莽曰鋪武薋漢書都尉治莽曰裒睦師古曰薋才私反字漢書榆水出東白狼漢書莽曰伏狄師古曰有白狼山故以名縣魏志太祖紀建安十二年北征烏桓登白狼山水經注遼水北屈徑白鹿山西即白狼山夕陽漢書有鐵官莽曰夕隂晉書慕容雲載記封夕陽公驪成漢書大揭石山在縣西南莽曰揭石師古曰揭音桀廣成漢書莽曰平虜晉書慕容皓載記石虎進陷廣成聚陽漢書莽曰篤睦平明漢書莽曰平陽遼西郡漢書秦置杜佑曰漢遼西郡故城在盧龍城東且慮漢書有高廟莽曰鉏慮師古曰且子余反慮音廬海陽漢書龍解水東入封大水封大水緩虛水皆南入海有鹽官史記功臣表海陽侯搖母餘水經注魏土地記曰令支城南六十里有海陽城新安平漢書夷水東入塞外柳城遼西之縣漢書馬首山在西南參栁水北入海西部都尉治後漢書趙苞傳遣使迎母及妻子將至郡道經栁城注故城在今營州南案後漢遼西郡治陽樂而苞母自甘陵來不當經栁城未詳公孫瓉傳瓉深入無繼反為丘力居等所圍于遼西管子城二百餘日糧盡衆潰士卒死者什五六虜亦飢困還走栁城令支漢書有孤竹城莽曰令氏亭應劭曰故伯夷國令音鈴孟康曰支音祗肥如漢書玄水東入濡水濡水南入海陽又有盧水南入玄莽曰肥而應劭曰晉滅肥肥子奔燕燕封于此史記功臣表肥如侯葵寅荆燕世家燕王定國殺肥如令郢人賔徒漢書莽曰勉武交黎漢書渝水首受塞外南入海東部都尉治莽曰禽虜應劭曰今昌黎師古曰渝音喻陽樂水經注魏氏土地記曰海陽城西南有陽樂城狐蘇漢書唐就水至徒河入海徒河漢書莽曰河福文成漢書莽曰言虜臨渝漢書渝水首受白狼東入塞外又有侯水北入渝莽曰馮德師古曰馮讀曰憑絫漢書下官水南入海又有揭石水賔水皆南入官莽曰選武師古曰絫力追反碣石漢書武帝紀元封元年夏上東巡海上至碣石自遼西歷北邊九原歸于甘泉文頴曰碣石在遼西絫縣絫縣今罷屬臨渝此石著海旁後漢遼西郡後漢志雒陽東北三千三百里陽樂海陽令支肥如後漢書和帝紀永元九年秋八月鮮卑冦肥如注故城在今平州劉虞傳前中山相張純等反衆至十餘萬屯肥如臨渝後漢志山海經曰碣石之山編水出焉其上有玉其下有青碧水經曰在縣南郭璞曰或曰在右北平驪城縣海邊山也盧龍塞三國志魏太祖紀建安十二年春北征烏桓夏五月至無終秋七月大水傍海道不通田疇請為鄉導公從之引軍出盧龍塞塞外道絶不通乃塹山堙谷五百餘里八月登白狼山卒與虜遇衆甚盛公車重在後被甲者少左右皆懼公登高望虜陳不整乃縱兵擊之使張遼為先鋒虜衆大崩斬踏頓及名王以下胡漢降者二十餘萬口田疇傳隨軍次無終時方夏水雨而濵海汙下濘滯不通虜亦遮守溪要軍不得進太祖患之以問疇疇曰此道秋夏每常有水淺不通車馬深不載舟船為難久矣舊北平郡治在平剛道出盧龍達于栁城自建武以來陷壞斷絶垂二百載而尚有餘徑可從今虜將以大軍當由無終不得進而退懈弛無備若默回軍從盧龍口越白檀之險出空虛之地路近而便掩其不備踏頓之首可不戰而禽也太祖曰善乃引軍還而署大朩表于水側路旁曰方今暑夏道路不通且俟秋冬乃復進軍虜候騎見之誠以為大軍去也太祖令疇將其衆為鄉導上徐無山出盧龍歷平剛登白狼堆去栁城二百餘里虜乃驚覺單于身自臨陳太祖與交戰遂大斬獲追奔逐北至柳城通鑑注曰前漢右北平郡治平剛縣後漢省平剛縣改治土垠縣杜佑曰盧龍縣在今平州城西北二百里又曰此時鮮卑庭已在右北平郡界蓋慕容廆之先也水經注濡水又東南徑盧龍塞塞道自無終東出渡濡水向林蘭陘東至清陘盧龍之險峻坂縈折故有九爭之名矣燕景昭元璽三年遣將軍步渾治盧龍道焚山刋石令通方軌刻石嶺上以記事功其銘尚存按盧龍東越青陘至凡城二百里許自凡城東北出趨平剛故城百八十里向黃龍則五百里盧龍城水經注濡水又東南徑盧龍故城東漢建安十二年魏武征踏頓所築也魏碣石晉書宣帝紀魏明帝景初二年討公孫淵進師經孤竹越碣石次于遼水晉遼西郡晉書惠帝紀太安二年封鮮卑段勿塵為遼西公段匹磾傳自務勿塵以後值晉喪亂自稱位號據有遼西之地而臣御晉人其地西盡幽州東界遼水所統胡晉可三萬餘家控弦可四五萬騎慕容皓載記前軍師慕容評敗石虎將石成等于遼西通鑑晉成帝咸康五年趙王虎以遼西迫近燕境數遭攻襲乃悉徙其民于冀州之南陽樂通鑑晉愍帝建興元年廆遣慕容翰攻段氏取徒河新城至陽樂翰因留鎮徒河壁青山注賢曰陽樂在今平州東肥如晉書慕容廆載記帝遣幽州諸軍討廆戰于肥如廆衆大敗慕容熙載記大城肥如及宿軍以尚書劉木為鎮南大將軍冀州刺史鎮肥如地理志髙雲以幽冀二州牧鎮肥如魏書馮𢎞傳黜世子崇鎮肥如海陽通鑑海陽令平翰令支晉書慕容廆載記段末波初統其國而不修備廆遣皓襲之入令支收其名馬寶物而還通鑑注令支縣漢為遼西郡晉省段氏據之為國都杜佑曰今北平郡盧龍縣即其地通鑑晉明帝太寧三年慕容廆與段氏方睦為段牙謀使之徙都牙從之即去令支慕容皓載記石虎至徐無段遼奔雲山虎進入令支石虎載記以李農為使持節監遼西北平諸軍事征東將軍營州牧鎮令支通鑑注趙置營州統遼西北平二郡通鑑晉康帝建元元年趙王虎命段蘭帥所從鮮卑二千人屯令支慕容垂載記餘巖叛據令支慕容農攻克令支慕容盛載記李朗留其子飬守令支躬迎魏師于北平李旱候知之襲克令支遣廣威將軍孟廣平率騎追朗及于無終斬之慕容熙載記以上庸公懿為鎮西將軍幽史刺史鎮令支魏書太祖紀慕容熙遣將冦遼西虎威將軍宿沓干等拒戰不利棄令支而還幽州即令支晉書慕容盛載記魏襲幽州執刺史盧溥而去魏書太宗紀命驍騎將軍延普自幽州北趨遼西漂渝津晉書石虎載記以桃豹為橫海將軍王華為度遼將軍統舟師十萬出漂渝津伐段遼安樂城晉書石虎載記石季龍將討慕容皓具船萬艘自河通海運穀豆千一百萬斛于安樂城通鑑晉穆帝永和元年趙王虎使征東將軍鄧恆將兵數萬屯樂安治攻具為取燕之計水經注濡水東南過遼西海陽縣又經牧城南分為二水北水謂之小濡水東徑樂安亭北東南入海濡水東南流徑樂安亭南東與新河故瀆合魏太祖征踏頓所導也三陘通鑑晉穆帝永和六年慕容霸軍至三陘魏征東將軍鄧恆惶怖焚倉庫棄樂安遁去注魏收地形志海陽縣有橫山蓋即三陘之地踏頓城晉書石虎載記虎謀伐昌黎遣曹伏將青州之衆渡海戌踏頓城無水而還因戌于海島運穀三百萬斛以給之隋書煬帝紀右第七軍可踏頓道臨渝通鑑晉安帝義熙十年燕王跋之宗族猶在長樂河間人褚匡請往迎之跋曰道路數千里復隔異國如何可致匡曰章武郡臨海舟楫可通出于遼西臨渝不為難也跋許之以匡為逰擊將軍中書侍郎厚資遣之匡與跋從兄買從弟睹自長樂帥五千餘戶歸于和龍盧溥鎮晉書地理志自幽州至于盧溥鎮以南地入于魏案魏書太祖紀范陽人盧溥聚衆海濵稱使持節征北大將軍幽州刺史攻掠郡縣殺幽州刺史封沓干于此或其遺址也平岡晉書成帝紀咸康四年二月石虎帥衆七萬擊段遼于遼西遼奔于平岡慕容皓載記遣揚威將軍淑虞攻烏丸悉羅侯于平缸盧龍塞晉書慕容俊載記俊率諸軍南伐出自盧龍次于無終魏書慕容俊傳鑿山除道入自盧龍克薊城而都之通鑑晉穆帝永和五年趙王虎卒國內大亂慕容霸上書燕主俊請伐趙俊曰鄴中雖亂鄧恆據樂安兵強糧足今若伐趙東道不可通也當由盧龍盧龍山徑險狹虜乘高斷要首尾為患將若之何霸曰恆雖欲為石氏拒守其將士顧家人懷歸志若大軍臨之自然瓦解臣請為殿下前驅東出徒河潛趨令支出其不意彼必震駭上不過閉門自守下不免棄城逃潰然則殿下可以安步而前無留難矣俊從之六年二月燕主􅖡使慕容霸將兵一萬自東道出徒河慕輿于自西道出蠮螉塞􅖡自中道出盧龍塞以伐趙命慕輿埿槎山通道水經注燕景昭元璽二年遣將軍步渾治盧龍道焚山刋石令通方軌刻石嶺上以紀事功通鑑晉孝武太元二十一年清河王會使征南將軍庫傉官偉建威將軍崇將兵五千為前鋒偉等屯盧龍近百日注遼東新昌縣有盧龍縣唐為平州盧龍縣慕容令所謂守肥如之險即其地也此遼東新昌後人置于漢遼西郡界非漢舊郡縣地也蠮螉塞晉書慕容皓將圖石氏從容謂諸將曰石虎自以安樂諸城守防嚴重城之南北必不設備今若詭路出不意冀之北境盡可破也于是率騎二萬出蠮螉塞長驅至于薊城通鑑注自龍城取西道入蠮螉塞通鑑晉孝武太元十年燕主垂遣慕容農出蠮螉塞歷凡城趙龍城討餘巖平州晉書地理志後漢末公孫度自號平州牧及其子康康子淵並擅據遼東東夷九種皆服事焉魏置東夷校尉居襄平而分遼東昌黎玄菟帶方樂浪五郡為平州後還合為幽州及淵滅後有護東夷校尉居襄平咸寧二年十月分昌黎遼東玄菟帶方樂浪等郡國五置平州平州初置以慕容廆為刺史永嘉之亂廆為衆所推及其孫俊移都于薊其後慕容垂子寶徙平州昌黎郡晉書漢屬遼東屬國都尉魏置郡統縣二通鑑注昌黎漢交黎縣屬遼西郡後漢屬遼東屬國都尉魏正始五年鮮卑內附復置遼東屬國立昌黎縣以居之後立昌黎郡武帝紀太康二年十月慕容廆冦昌黎二年三月安北將軍嚴詢敗慕容廆于昌黎康帝紀建元二年二月慕容皓及鮮卑帥宇文歸戰于昌黎歸衆大敗奔于漠北慕容廆載記元帝承制拜廆散騎常侍都督遼左雜夷流人諸軍事龍􅋮將軍大單于昌黎公慕容皓載記皓將乘海討仁乃率三軍從昌黎踐凌而進後徙昌黎郡昌黎賔徒晉書吳王晏傳貶為賔徒縣王慕容垂載記苻堅以為冠軍將軍討賔都侯通鑑作賔徒紫蒙川晉書慕容廆載記其先有熊氏之苗裔世居北夷邑于紫蒙之野棘城晉書慕容廆載記曾祖莫護跋魏初率其諸部入居遼西從宣帝伐公孫氏有功拜率義王始建國于棘城之北通鑑注棘城在昌黎縣界是後慕容氏置棘城縣元魏太平真君八年併棘城入昌黎郡龍城縣杜佑曰棘城在營州城東南一百七十里廆以大棘城即帝顓頊之墟也元康四年乃移居之大素延率衆十萬圍棘城平州刺史崔毖隂結高句驪及宇文段國等共攻棘城連營三十里慕容皓載記石虎進軍至棘城戍卒數十萬四面進攻文昌殿晉書慕容皓載記起文昌殿朝陽門晉書慕容皓載記立籍田于朝陽門東案當在棘城徒河晉書慕容廆載記太康十年廆遷于徒河之青山通鑑注徒河縣漢屬遼西後漢屬遼東屬國魏晉省併入昌黎郡後慕容氏復置徒河縣魏太平真君八年併徒河入昌黎郡廣興縣杜佑曰徒河青山在營州城東百九十里慕容皓載記段遼冦徒河皓將張萌逆擊敗之慕容垂載記石虎遣將鄧恆率衆數萬屯于樂安營攻取之備垂戌徒河與恆相持柳城晉書慕容皓載記段遼弟蘭與翰冦柳城都尉石琮擊敗之句餘蘭翰復圍柳城皓遣寧逺將軍慕容汗及封奕等救之為蘭所敗蘭復攻柳城為飛梯地道圍守二旬石琮躬勒將士出擊敗之蘭乃遁歸龍城晉書慕容皓載記使陽裕唐柱等築龍城構宫廟改柳城為龍城縣通鑑晉成帝咸康七年正月燕王皓使唐國內史陽裕等築城于柳城之北龍山之西立宗廟宫室命曰龍城慕容廆居徒河之青山後徙棘城今自棘城徙都龍城杜佑曰營州柳城郡古孤竹國也春秋為山戎肥子二國地慕容氏龍城在其北柳城縣有白狼山白狼水又有黎扶縣縣故城在東南其龍山即慕容皓余龍所也有饒樂水漢徒河縣城八年十月燕王皓遷都龍城其時有黑龍白龍各一見于龍山皓親率遼屬覘之去龍二百餘步祭以太牢二龍交首嬉翔解角而去皓大悅還宫赦其境內號新宫曰和龍立龍翔佛寺于山上慕容暐載記慕容桓率鮮卑五千退保和龍苻堅載記遣後將軍俱難與鄧羌等率步騎二十萬東出和龍討代王涉翼犍苻雒率衆七萬發和龍使石越率騎一萬自東萊出石徑襲和龍海行四百餘里慕容垂載記慕容農還屯龍城通鑑晉孝武太元十年燕主垂以農為使持節都督幽平二州北狄諸軍事幽州牧鎮龍城晉書慕容垂載記建留臺于龍城以高陽王隆録留臺尚書事慕容寶載記垂之伐魏以龍城舊都宗廟所在復使寶庶子清河公會鎮幽州委以東北之重寶率百數騎馳如龍城慕容盛載記慕容奇引軍至橫溝去龍城十里魏書世祖紀延和元年車駕至和龍臨其城發民三萬人穿圍塹以守之二年遣撫軍大將軍永昌王健尚書左僕射安原督諸軍討和龍健三年撫軍大將軍永昌王建司空汝隂公長孫道生侍中古弼督諸軍討和龍太延元年詔驃騎大將軍樂平王丕等五將率騎四萬伐和龍正陽殿晉書慕容俊載記燕巢于俊正陽殿之西椒新昌殿晉書慕容盛載記宴其羣臣于新昌殿承華殿晉書慕容熙載記為苻氏起承華殿高承光一倍負