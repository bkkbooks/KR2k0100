龍山十八年改為柳城大業初置遼西郡有帶方山禿黎山雞鳴山松山有渝水白狼水王世績傳遼東之役與漢王並為行軍元帥至柳城遇疾疫而還虞綽傳行宫次于柳城縣之臨海頓李景傳景在北平為高開道所圍獨守孤城外無聲援遼西太守鄧皓率兵救之遂歸柳城靺鞨傳渠帥度地稽率其部來降拜為右光祿大夫居之柳城臨渝宫隋書煬帝紀大業十年三月癸亥次臨渝宫親御戎服禡祭黃帝斬叛軍者以釁鼓盧龍塞隋書隂夀傳開皇初高寶寧引突厥攻圍北平令夀率步騎數萬出盧龍塞以討之梁文謙傳領武賁郎將為盧龍道軍副臨渝鎮隋書突厥傳營州刺史高寶寧作亂沙鉢略與之合軍攻陷臨渝鎮渝關隋書高祖紀開皇三年二月癸亥城榆關通鑑注臨渝關在平州盧龍縣東一百八十里新唐書營州城西四百八十里有渝關守捉五代史云幽州北七百里有渝關下有渝水通海循海有道狹處才數尺是所謂臨渝關也宋白續通典曰漢石城舊縣取碣立如城以名之唐貞觀十五年于故臨渝縣城置臨渝縣萬嵗通天二年改為石城今史文多誤作榆賀婁子幹傳高祖以子幹曉習邊事授榆關總管十鎮諸軍事高麗傳漢王諒討高麗餽運不繼師出臨渝關復遇疾疫王師不振瀘河鎮通鑑大業七年帝將討高麗發民夫運米積于瀘河懷逺二鎮注新唐志曰隋于營州之境汝羅故城置遼西郡領遼西瀘河懷逺三縣隋書觀王雄傳出遼道次瀘河鎮懷逺鎮隋書薛世雄傳帝至栁城以世雄為東北道大使行燕郡太守鎮懷逺高麗傳高麗遣使乞降帝許之頓于懷逺鎮受其降欵唐書高祖紀煬帝征遼東遣高祖督運糧于懷逺鎮臨海頓隋書觀王雄傳帝令綝于臨海頓别有所督望海頓通鑑大業八年勑運黎陽雒口太原等倉穀於望海頓注望海頓當在遼西界黃龍隋書高祖紀開皇三年行軍總管隂夀破高寶寧于黃龍赦黃龍死罪以下長孫晟車騎將軍出黃龍道齎幣賜奚霫契丹等白狼塞隋書于仲文傳詔仲文率兵屯白狼塞以備胡唐平州北平郡唐書地理志平州北平郡下初治臨渝武德元年徙盧龍土貢熊鞹蔓荆實人參有府一曰盧龍有盧龍軍天寶二年置又有柳城軍永泰元年置有溫溝白望西硤石東硤石渌疇米磚長楊黃花紫蒙白狼昌黎遼西等十二戌受川周愛二鎮城東北有明關鶻湖城牛尾城盧龍唐書地理志中本肥如武德二年更名又置撫寧縣七年省石城唐書地理志中本臨渝武德七年省貞觀十五年復置萬嵗通天二年更名有臨渝關一名臨閭關有大海關有碣石山有溫昌鎮馬城唐書地理志中古海陽城也開元二十八年置以通水運東北有千金冶城東有茂鄉鎮城碣石唐書唐休璟傳休璟以儒者號知兵自碣石踰四鎮其間綿地幾萬里山川夷坦障塞之要皆能言之故行師料敵未嘗敗渝關唐書高麗傳帝總飛騎入臨渝關皇太子迎道左郭英傑傳與禆將吳克勤烏知義羅守忠帥萬騎及奚衆討契丹屯渝關契丹酋長可突干拒戰都山下官軍不利知義守忠引麾下遁去英傑克勤力戰死契丹傳營州都督許欽淡以州甲五百合奚君長李大酺兵共攻可突干不勝欽淡懼徙軍入渝關奚傳契丹可突干反脅奚衆并附突厥魯蘇不能制奔渝關李忠臣傳攻長楊戰獨山襲渝關北平通鑑後梁均王乾化三年初幽州七百里有渝關下有渝水通海自關東北循海有道道狹處才數尺旁皆亂山高峻不可越北至進午口舊置八防禦軍募土兵豫之田租皆供軍食不入于薊幽州嵗致繒纊以供戰士衣每嵗早穫清野堅壁以待契丹契丹至輒閉壁不戰俟其去選驍勇據隘邀之契丹常失利土兵皆自為田園力戰有功則賜勳加賞由是契丹不敢輕入冦及周德威為盧龍節度使恃勇不修邊備遂失渝關之險契丹每芻牧于營平之間五代史渝關東臨海北有兔耳覆舟山山皆斗絶並海東北有路狹僅通車其旁地可耕植唐時置東硤石西硤石渌疇米磚長楊黃花紫蒙白狼城以扼之宋白續通典渝關關城下有渝水入大海其關東臨海北有兔耳山覆舟山山皆斗峻山下循海岸東北行狹處才通一軌三面皆海北連陸關西亂山至進牛柵凡六口柵戍相接此天所限內外也通鑑注引金國節要燕山之地易州西北乃金坡關昌平縣之西乃居庸關順州之地乃古北口景州之東北乃松亭關平州之東乃渝關渝關之東即金人來路也此數關皆天造地設以分蕃漢之限一夫守之可以當百本朝復燕之役若得諸關門則燕山之境可保然關內之地平灤營三州自後唐陷于安巴堅改平州為遼興府以營灤二州𨽻之號為平州路至石晉之初耶律德光又得燕山檀順景薊涿易諸州建燕山為燕京以轄六郡號燕京路而與平州自成兩路海上議割地但云燕雲兩路而已初謂燕山路盡得關內之地殊不知燕山平州盡在關內而異路也破遼之後金人復得平州路據之故斡里雅布後由平州入冦乃當時議燕雲不明地理之故又金國行程云灤州故無之唐末安巴堅攻陷平營劉守光據幽州暴虐民多亡入敵中築乃此城營州古柳城郡舜所築也乃殷之孤竹國漢唐遼西地其城外多大山高下皆石不産草木地當營室故以為名自營州東至渝關並無保障沃野千里北限大山重岡復嶺中有五關唯渝關居庸可以通餉饋松亭金坡古北口止通人馬不可行車其山之南則五穀百果良材美本無所不有出關未數里則地皆瘠鹵豈天設此以限內外乎漢武臺唐書太宗紀貞觀十九年九月戊午次漢武臺刻石紀功西硤石唐書契丹傳諸將戰西硤石黃麞谷王師敗績東硤石唐書王孝傑傳軍至東硤石谷與賊接道隘虜衆孝傑率鋭兵先驅出谷整陳與賊戰而後軍總管蘇宏暉以其軍退援不至為虜所乘軍潰孝傑隨令死士相蹂且盡契丹傳武后更詔夏官尚書王孝傑羽林衛將軍蘇宏暉率兵十七萬討契丹戰東硤石師敗孝傑死之營州柳城郡唐書地理志營州柳城郡上都督府本遼西郡萬嵗通天元年為契丹所陷聖厯二年僑治漁陽開元五年又還治柳城天寶元年更名土貢人參麝香豹尾骨􅙡有平盧軍開元初置東有鎮安軍本燕郡守捉城貞元二年為軍城西四百八十里有渝關守捉城又有汝羅懷逺巫關襄平四守捉城唐書宋慶禮傳初營州都督府治柳城扼制奚契丹武后時趙文􅔘失兩國情攻殘其府更治東冶陽城玄宗時奚契丹欵附帝欲復治故城宋璟固爭不可獨慶禮執處其利乃詔輿人子詹平薑師度左驍衛將軍邵宏等為使築裁三旬畢俄兼營州都督開屯田八十餘所追拔漁陽淄青沒戶還舊田宅又集商胡立邸肆不數年倉廥充居人蕃輯柳城唐書地理志中西北接奚北接契丹有東北鎮醫巫閭山祠又東有碣石山都山唐書契丹傳可突干盜邊幽州長史薛楚王等率萬騎及奚擊之戰都山下摘星山唐書契丹傳欽德入冦幽州劉仁恭窮師踰摘星山討之通鑑作摘星嶺白狼河唐書奚傳其地東北接契丹西突厥南白狼河北霫吐護真河安祿山傳率河東兵討契丹至吐護真河晝夜行三百里次天門嶺通鑑注自雄武軍東北度灤河有古盧龍鎮有斗陘嶺自古盧龍北經九荆嶺受米城張洪隘度石嶺至奚王帳六百里又東北傍吐護真河五百里至奚契丹牙帳乂出檀州燕樂縣東北百八十五里至長城口又北八百里有吐護真河奚王牙帳也紫蒙川通鑑玄宗開元二十二年張守圭出師紫蒙川大閲以鎮撫之注據晉書載記秦漢之間東胡邑于紫蒙之野唐書地理志平州有紫蒙白狼昌黎等戍蓋平州之北境契丹之南界也伐孤竹桓公北伐孤竹未至卑耳之溪十里闟然正瞪然視援弓將射引而未敢發也謂左右曰見是前人乎左右對曰不見也公曰事其不濟乎寡人大惑豈有人若此者乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉霸王之君興而登山神見且走馬前疾道也袪衣示前有水也右袪衣示從右方涉也至卑耳之溪有贊水者曰從左方涉其深及冠從右方涉其深至膝若右涉其大濟桓公立拜管仲于馬前曰仲父之聖至若此寡人之抵罪也久矣管仲對曰夷吾聞之聖人先知無形今也有形而後知之臣非聖也善承教也營平二州地名記
